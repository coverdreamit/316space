# =============================================================================
# 316space 엣지 Nginx (Docker 컨테이너 내부에서 listen 80)
# - 브라우저 → 호스트 ${PUBLIC_PORT:-6280} → 이 컨테이너 80
# - upstream 은 Docker DNS 서비스명 + 컨테이너 포트만 사용합니다.
#   · fe:3000  ← 호스트 13000(FE_HOST_PORT) 과 무관 (compose 가 컨테이너 3000에 붙임)
#   · be:8080  ← 호스트 18080(BE_HOST_PORT) 과 무관
# docker-compose.yml 의 ports 는 “호스트↔컨테이너”만 바꾸며, 여기 upstream 은 수정하지 않습니다.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream fe_app {
    server fe:3000;
}

upstream be_api {
    server be:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # 프론트: Vite preview (컨테이너 3000)
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_pass http://fe_app;
    }

    # API: Spring Boot (컨테이너 8080)
    location /api {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://be_api;
    }
}
