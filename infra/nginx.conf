# =============================================================================
# 316space 엣지 Nginx (컨테이너 안에서 listen 80)
#
# [오해 금지] 6280 → 80 → 13000 → 18080 같은 “연쇄”는 없습니다.
# 13000·18080 은 “호스트에서 각 컨테이너로 직접 들어오는 별도 문”일 뿐,
# Nginx 는 Docker 내부 DNS 로 fe·be 컨테이너 포트에 바로 붙습니다.
#
# ① 통합 진입 (브라우저 한 주소)
#    인터넷 → 호스트:6280 ──포트퍼워딩──→ [nginx 컨테이너]:80
#                              ├─ location /     → fe:3000   (Vite, 컨테이너 내부 3000)
#                              └─ location /api  → be:8080   (Spring, 컨테이너 내부 8080)
#
# ② Nginx 우회·직접 진입 (디버그·점검용, compose 의 ports)
#    인터넷 → 호스트:13000 ──→ [fe 컨테이너]:3000
#    인터넷 → 호스트:18080 ──→ [be 컨테이너]:8080
#
# upstream 은 반드시 fe:3000 / be:8080 만 사용 (호스트 13000·18080 넣지 않음).
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream fe_app {
    server fe:3000;
}

upstream be_api {
    server be:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # 프론트: Vite preview (컨테이너 3000)
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_pass http://fe_app;
    }

    # API: Spring Boot (컨테이너 8080)
    location /api {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://be_api;
    }
}
