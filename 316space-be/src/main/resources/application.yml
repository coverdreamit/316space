server:
  port: 8080

spring:
  application:
    name: 316space-be
  profiles:
    active: dev

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-256bits}
  expiration-ms: 1800000 # 30분
  profile-edit-expiration-ms: 600000 # 개인정보 변경 화면 진입용(10분)

slack:
  # 예약·문의 알림 폴백. DB(app_setting)에 값이 있으면 DB가 우선입니다.
  incoming-webhook-url: ${SLACK_WEBHOOK_URL:}

admin:
  login-id: ${ADMIN_LOGIN_ID:admin}
  email: ${ADMIN_EMAIL:admin@316space.com}
  password: ${ADMIN_PASSWORD:Admin1234!}
  name: ${ADMIN_NAME:관리자}
  phone: ${ADMIN_PHONE:010-0000-0000}
