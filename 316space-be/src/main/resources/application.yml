server:
  port: 8080

spring:
  application:
    name: 316space-be
  profiles:
    active: dev

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Hibernate 등으로만 만들어진 기존 DB(히스토리 테이블 없음)에서도 부팅되도록
    baseline-on-migrate: true
    baseline-version: 1

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-256bits}
  expiration-ms: 1800000 # 30분
  profile-edit-expiration-ms: 600000 # 개인정보 변경 화면 진입용(10분)

admin:
  login-id: ${ADMIN_LOGIN_ID:admin}
  email: ${ADMIN_EMAIL:admin@316space.com}
  password: ${ADMIN_PASSWORD:Admin1234!}
  name: ${ADMIN_NAME:관리자}
  phone: ${ADMIN_PHONE:010-0000-0000}
