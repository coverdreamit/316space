server:
  port: 8080

spring:
  application:
    name: 316space-be
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-256bits}
  expiration-ms: 1800000 # 30분

admin:
  email: ${ADMIN_EMAIL:admin@316space.com}
  password: ${ADMIN_PASSWORD:Admin1234!}
  name: ${ADMIN_NAME:관리자}
  phone: ${ADMIN_PHONE:01000000000}
