# (선택) 정적 dist 만 Nginx로 서빙할 때용. 현재 Dockerfile은 vite preview :3000 을 사용합니다.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
