# 테스트·스테이징: Nginx(진입점) + FE(vite preview 컨테이너 :3000) + BE(컨테이너 :8080)
# 로컬 개발은 도커 없이: FE http://localhost:3000 , BE http://localhost:8080
#
# DB: 외부 PostgreSQL (coverdreamit.iptime.org:9432) — 컨테이너 없음
#
# 트래픽 (연쇄 아님 — 병렬 포트 매핑 + 내부 DNS):
#   · :6280 → nginx:80 → (내부) fe:3000 또는 be:8080  ← infra/nginx.conf (resolver + 변수 proxy_pass)
#   · :13000 → fe:3000 만 (Nginx 안 탐)
#   · :18080 → be:8080 만 (Nginx 안 탐)
#
# 실행(저장소 루트): docker compose up -d --build
# - 통합: http://<서버>:${PUBLIC_PORT:-6280}
# - FE 직접: :${FE_HOST_PORT:-13000} (/api 는 Vite 가 be:8080 으로 프록시)
# - BE 직접: :${BE_HOST_PORT:-18080}/api/...

services:
  fe:
    build:
      context: ./316space-fe
      dockerfile: Dockerfile
      args:
        # 브라우저 절대 URL이 필요하면 설정 (예: http://coverdreamit.iptime.org:6280/api)
        - VITE_PUBLIC_API_URL=${VITE_PUBLIC_API_URL:-}
    container_name: 316space-fe
    ports:
      - "${FE_HOST_PORT:-13000}:3000"
    environment:
      # :3000 직접 접속 시 /api → be (통합 URL(nginx)만 쓰면 브라우저는 /api 를 nginx가 처리)
      - VITE_API_PROXY_TARGET=http://be:8080
    restart: unless-stopped

  be:
    build:
      context: ./316space-be
      dockerfile: Dockerfile
    container_name: 316space-be
    expose:
      - "8080"
    ports:
      - "${BE_HOST_PORT:-18080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=${DB_HOST:-coverdreamit.iptime.org}
      - DB_PORT=${DB_PORT:-9432}
      - DB_NAME=${DB_NAME:-316space}
      - DB_USERNAME=${DB_USERNAME:-hipms}
      - DB_PASSWORD=${DB_PASSWORD:-hipms}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production-must-be-256bits}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@316space.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin1234!}
      - ADMIN_NAME=${ADMIN_NAME:-관리자}
      - ADMIN_PHONE=${ADMIN_PHONE:-01000000000}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: 316space-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      fe:
        condition: service_healthy
      be:
        condition: service_healthy
    restart: unless-stopped

